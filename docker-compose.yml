version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Critical: enable keyspace expiry events for the cleanup worker
    command: redis-server --notify-keyspace-events Ex --save "" --appendonly no
    volumes:
      - redis_data:/data
  
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: lms_poc
    volumes:
      - mongo_data:/data/db

volumes:
  redis_data:
  mongo_data: